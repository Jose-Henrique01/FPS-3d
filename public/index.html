<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 3D - Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-family: 'Arial', sans-serif;
        }

        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ff00;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff00;
            z-index: 10;
        }

        .hud-item {
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            z-index: 5;
        }

        .crosshair-line {
            position: absolute;
            background-color: #00ff00;
            opacity: 0.8;
        }

        .crosshair-h {
            width: 8px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair-v {
            width: 2px;
            height: 8px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #radar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            border: 2px solid #00ff00;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            z-index: 10;
        }

        #radarCanvas {
            width: 100%;
            height: 100%;
        }

        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: all;
        }

        .menu-hidden {
            display: none !important;
        }

        #menu h1 {
            font-size: 48px;
            color: #00ff00;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #00ff00;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px #00ff00; }
            50% { text-shadow: 0 0 40px #00ff00; }
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            pointer-events: all;
            min-width: 200px;
        }

        .menu-btn:hover {
            background: #00cc00;
            box-shadow: 0 0 20px #00ff00;
            transform: scale(1.05);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: all;
        }

        .game-over-hidden {
            display: none !important;
        }

        #gameOverScreen h2 {
            font-size: 48px;
            color: #ff0000;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff0000;
        }

        #gameOverScreen p {
            font-size: 24px;
            color: #00ff00;
            margin-bottom: 30px;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #00ff00;
            font-size: 14px;
            text-align: right;
            opacity: 0.7;
            z-index: 10;
        }

        .controls-item {
            margin-bottom: 5px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <!-- Crosshair -->
        <div id="crosshair">
            <div class="crosshair-line crosshair-h"></div>
            <div class="crosshair-line crosshair-v"></div>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div class="hud-item">HEALTH: <span id="health">100</span></div>
            <div class="hud-item">AMMO: <span id="ammo">30</span>/<span id="maxAmmo">30</span></div>
            <div class="hud-item">KILLS: <span id="kills">0</span></div>
            <div class="hud-item">WAVE: <span id="wave">1</span></div>
        </div>

        <!-- Radar -->
        <div id="radar">
            <canvas id="radarCanvas"></canvas>
        </div>

        <!-- Controls Info -->
        <div id="controls">
            <div class="controls-item">W/A/S/D - Move</div>
            <div class="controls-item">MOUSE - Look Around</div>
            <div class="controls-item">CLICK - Shoot</div>
            <div class="controls-item">R - Reload</div>
            <div class="controls-item">SPACE - Jump</div>
            <div class="controls-item">ESC - Menu</div>
        </div>

        <!-- Menu -->
        <div id="menu">
            <h1>🎮 FPS 3D GAME 🎮</h1>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="game.startGame()">INICIAR JOGO</button>
                <button class="menu-btn" onclick="game.showSettings()">CONFIGURAÇÕES</button>
                <button class="menu-btn" onclick="alert('Tutorial: Destrua todos os inimigos!\n\nControles:\nW/A/S/D - Mover\nMouse - Olhar\nClique - Atirar\nR - Recarregar\nEspaço - Pular')">TUTORIAL</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen">
            <h2 id="gameOverTitle">GAME OVER</h2>
            <p>Pontuação Final: <span id="finalScore">0</span></p>
            <button class="menu-btn" onclick="game.restartGame()">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script src="bundle.js"></script>
</body>
</html>
